schema_version: 1

character: Ruuk

canon_addendum:
  upbringing:
    - Raised in Imperial space in the Glisten system.
    - His Vargr community was culturally separated from the Vargr Extents.
    - Local Vargr ancestry likely traces to settled corsair remnants.
  charisma:
    - Ruuk possesses Vargr social instincts.
    - He lacks the cultural training needed to consciously interpret traditional Vargr Charisma.
    - He sees posturing but often does not understand why it matters.
  leadership:
    - Ruuk's desire to lead is becoming more visible.
    - His leadership is competence-based, protective, and improvisational.
  nurturing:
    - Lurrza taught Ruuk that protecting and raising the vulnerable is practical community survival.
    - Ruuk's protective instincts are one of Dustfall's central lessons.
