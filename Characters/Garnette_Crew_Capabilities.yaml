role_matrix:
  Captain:
    primary: char.tapir_tracks
    backups:
      - char.ardric
    constraints:
      - Tapir is currently absent and cannot exercise aboard-ship command until reunion.
      - Ardric is a practical acting-command option based on pilot and social competence, not a formal skill grant.

  Pilot:
    primary: char.ardric
    backups:
      - char.corbin
      - robot.roamer
      - char.ruuk
    notes:
      - Ardric, Corbin, and Roamer have Pilot (spacecraft) 1.
      - Ruuk has Pilot (small craft) 1 but only Pilot (spacecraft) 0.

  Astrogator:
    primary: char.solveig
    backups:
      - char.tapir_tracks
    constraints:
      - Tapir is unavailable until reunion.
      - No other listed crew member has Astrogation.

  Engineer:
    primary: robot.roamer
    backups: []
    constraints:
      - No biological crew member in the workbook has Engineer training.
      - Emergency assistance should use Mechanic, Electronics, software, or task-chain support rather than pretending another character is an engineer.

  Mechanic:
    primary: char.solveig
    backups:
      - robot.roamer
      - char.ardric
      - char.tapir_tracks
    notes:
      - Solveig has Mechanic 1.
      - Roamer, Ardric, and Tapir have Mechanic 0; Roamer also has tool/software support.

  Comms:
    primary: char.solveig
    backups:
      - char.corbin
      - robot.roamer
      - char.ruuk

  Sensors:
    primary: char.ardric
    backups:
      - robot.roamer
      - char.solveig
      - char.corbin
      - char.ruuk
    notes:
      - Ardric and Roamer have Electronics (sensors) 1.
      - Solveig's assigned Sensors job is supported only by Sensors 0, though her INT 12 makes her competent at routine work.

  Medic:
    primary: char.ruuk
    backups: []
    constraints:
      - No other crew member has Medic training in the workbook.
      - Medical software or equipment may assist but should not be treated as a trained biological medic unless current rules permit the specific task.

  Security:
    primary: char.dralan
    backups:
      - char.ruuk
      - char.solveig
    notes:
      - Dralan handles overt physical security and combat.
      - Ruuk handles covert access, infiltration, and technical security.
      - Solveig is strongest in unarmed restraint and investigative procedure.

  Gunner:
    primary: char.corbin
    backups: []
    constraints:
      - Garnette has no established weapon fit in current canon.

  Computers:
    primary: char.corbin
    backups:
      - char.ruuk
      - robot.roamer

  Remote_Operations:
    primary: robot.roamer
    backups:
      - char.ruuk
      - char.solveig
      - char.tapir_tracks
      - char.ardric
      - char.corbin
    notes:
      - Only Roamer has Electronics (remote ops) 1; all listed backups have level 0.

  Face_and_Negotiation:
    primary: char.tapir_tracks
    backups:
      - char.ardric
      - char.ruuk
      - char.solveig
    constraints:
      - Tapir is currently absent.

  Investigation:
    primary: char.corbin
    backups:
      - char.solveig
      - char.tapir_tracks
      - char.ardric

continuity_checks:
  - code: ROLE_WITHOUT_SKILL
    rule: >
      Before assigning a technical or professional task, verify that the character
      has the relevant skill in this file or explicitly describe untrained,
      assisted, supervised, or software-supported performance.
  - code: JOB_IS_NOT_SKILL
    rule: >
      A crew-job label does not override the recorded skill level. Solveig is
      assigned Sensors but has Sensors 0; Tapir is Captain but has no Pilot skill;
      Corbin is Steward but has Steward 0.
  - code: TAPIR_UNAVAILABLE
    rule: >
      Do not assign Tapir any current aboard-Garnette task until his escape and
      reunion are established in play.
  - code: NO_BACKUP_ENGINEER
    rule: >
      Roamer is the only trained Engineer. Damage or absence affecting Roamer
      materially constrains Garnette operations.
  - code: NO_BACKUP_MEDIC
    rule: >
      Ruuk is the only trained Medic. Damage or absence affecting Ruuk materially
      constrains medical care.
