authority: explicit_referee_ruling
source:
  filename: Secrets of the Ancients crew.xlsx
  worksheet: Sheet1
  range: A1:H173
  note: >
    This workbook is the current authority for crew characteristics, raw skill
    levels, and assigned shipboard jobs. It supersedes older character-stat
    summaries where they disagree.

usage_rules:
  - Use raw skill levels from this file when deciding whether a character is qualified for a task.
  - Do not treat an assigned crew job as proof of training in every related skill.
  - Apply characteristic DMs, equipment, software, augments, and assistance separately.
  - A skill at level 0 removes the untrained penalty but does not indicate professional expertise.
  - A missing skill is untrained unless another current canon file explicitly grants it.
  - Do not silently move characters into roles for which they lack the relevant skill.
  - When several characters can fill a role, prefer the character with the strongest relevant raw skill and characteristic DM.
  - Temporary role coverage is allowed, but describe it as emergency, supervised, assisted, or software-supported when appropriate.

