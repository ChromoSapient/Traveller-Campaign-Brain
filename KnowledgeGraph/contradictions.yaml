schema_version: 1

contradictions:
  - id: contradiction.ship_name
    claims:
      - Garnette
      - Garnett's
      - Garnette's
    preferred: Garnette
    status: resolved
    reason: explicit_referee_ruling
    validation_code: INVALID_SHIP_NAME

  - id: contradiction.garnette_vs_rts
    claims:
      - Garnette_is_the_300_ton_Hiver_transport
      - Garnette_is_a_100_ton_modified_Type_S
    preferred: Garnette_is_a_100_ton_modified_Type_S
    status: resolved
    reason: explicit_referee_correction_and_published_adventure_source
    validation_code: SHIP_IDENTITY_CONFLATION

  - id: contradiction.garnette_owner
    claims:
      - Garnette_owned_by_party
      - Garnette_owned_by_Mercedes
    preferred: Garnette_owned_by_Mercedes
    status: resolved
    reason: explicit_referee_ruling
    validation_code: INVALID_GARNETTE_OWNERSHIP

  - id: contradiction.garnette_stock_craft
    claims:
      - stock_stat_block_lists_air_raft_and_probe_drones
      - narrative_configuration_converted_those_spaces
    preferred: narrative_configuration_converted_those_spaces
    status: resolved
    reason: vessel_specific_narrative_overrides_generic_stat_block
    validation_code: INVALID_GARNETTE_CRAFT

  - id: contradiction.garnette_turret
    claims:
      - empty_double_turret_installed
      - turret_removed_and_replaced_by_sensor_dome
    preferred: turret_removed_and_replaced_by_sensor_dome
    status: resolved
    reason: later_vessel_specific_description
    validation_code: INVALID_GARNETTE_TURRET

  - id: contradiction.tapir_presence
    claims:
      - Tapir_is_aboard_Garnette
      - Tapir_is_in_bounty_hunter_custody
    preferred: Tapir_is_in_bounty_hunter_custody
    status: resolved_until_future_play
    validation_code: INVALID_TAPIR_PRESENCE

  - id: contradiction.rts_availability
    claims:
      - RTS_is_available_or_will_return
      - RTS_was_seized_and_will_not_return
    preferred: RTS_was_seized_and_will_not_return
    status: resolved
    validation_code: INVALID_RTS_AVAILABILITY

  - id: contradiction.roamer_ownership
    claims:
      - Roamer_is_self_owning
      - Ardric_owns_Roamer
    preferred: Roamer_is_self_owning
    status: resolved
    reason: Ardric ownership is legal fiction only.
    validation_code: INVALID_ROAMER_OWNERSHIP

  - id: contradiction.lurrza_location
    scope:
      mainline: several_jumps_away
      glisten_heist_branch: in_Glisten
    status: branch_specific
    validation_code: BRANCH_LOCATION_MISMATCH

  - id: contradiction.mobility_scan
    claims:
      - casual_scan_detects_augment
      - augment_is_passive_invisitech
    preferred: augment_is_passive_invisitech
    status: resolved
    validation_code: INVALID_AUGMENT_DETECTION

  - id: contradiction.esseray_spelling
    claims:
      - Eseray
      - Esseray
    preferred: Esseray
    status: resolved
    reason: explicit_referee_ruling
    validation_code: INVALID_ESSERAY_SPELLING

  - id: contradiction.esseray_jump_drive
    claims:
      - Esseray_cannot_use_Jump_Drive
      - Esseray_can_use_Jump_Drive_for_relatively_small_subgroups
    preferred: Esseray_can_use_Jump_Drive_for_relatively_small_subgroups
    status: resolved
    reason: explicit_referee_ruling
    validation_code: INVALID_ESSERAY_JUMP_CAPABILITY

  - id: contradiction.generated_story_mainline
    claims:
      - generated_story_events_are_Mainline_canon
      - generated_story_events_are_isolated_noncanonical_branches
    preferred: generated_story_events_are_isolated_noncanonical_branches_unless_referee_promoted
    status: resolved
    reason: explicit_referee_ruling
    validation_code: GENERATED_BRANCH_CANON_LEAK

  - id: contradiction.numbered_ancients_named_droyne
    claims:
      - all_Ancient_era_Droyne_are_numbered_Ancients
      - numbered_Ancients_are_Yaskoydray_and_420_offspring_only
    preferred: numbered_Ancients_are_Yaskoydray_and_420_offspring_only
    status: resolved
    reason: explicit_referee_ruling
    validation_code: NUMBERED_ANCIENT_DROYNE_CONFLATION
