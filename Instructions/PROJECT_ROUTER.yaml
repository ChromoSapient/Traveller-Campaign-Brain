schema_version: 1
router_version: 1.3
project: Mysterious Secrets of Wrathful Ancients
repository: ChromoSapient/Traveller-Campaign-Brain
branch: main

project_source_manual:
  filename: Project_Operating_Manual.md
  accepted_project_source_aliases:
    - Project_Operating_Manual(2).md
  location: Instructions
  purpose:
    - prose_conventions
    - recommendation_protocol
    - session_workflow
    - transcript_processing

always_read:
  - Instructions/Project_Operating_Manual.md
  - KnowledgeGraph/campaign_state.yaml
  - KnowledgeGraph/canon_precedence.yaml
  - KnowledgeGraph/contradictions.yaml
  - Instructions/BRANCH_AND_DRAFT_POLICY.yaml
  - KnowledgeGraph/Future_Knowledge_Boundaries.yaml

task_routes:
  prose:
    - Chronology/Campaign_Chronology.yaml
    - KnowledgeGraph/scene_rules.yaml
    - KnowledgeGraph/entities.yaml
    - KnowledgeGraph/relationships.yaml
    - KnowledgeGraph/facts.yaml
    - KnowledgeGraph/knowledge_states.yaml
    - Characters/Garnette_Crew_Capabilities.yaml
    - KnowledgeGraph/Ancients_Kursae_Esseray_Backdrop.yaml
    - KnowledgeGraph/Future_Knowledge_Boundaries.yaml

  recommendations:
    - Chronology/Campaign_Chronology.yaml
    - KnowledgeGraph/scene_rules.yaml
    - KnowledgeGraph/campaign_state.yaml
    - Story/Campaign_Hook_Index.yaml
    - Characters/Garnette_Crew_Capabilities.yaml
    - KnowledgeGraph/Ancients_Kursae_Esseray_Backdrop.yaml
    - KnowledgeGraph/Future_Knowledge_Boundaries.yaml

  live_edge:
    - KnowledgeGraph/campaign_state.yaml
    - Chronology/Campaign_Chronology.yaml
    - Instructions/BRANCH_AND_DRAFT_POLICY.yaml
    - KnowledgeGraph/validation_rules.yaml

  characters:
    - KnowledgeGraph/entities.yaml
    - KnowledgeGraph/relationships.yaml
    - KnowledgeGraph/facts.yaml
    - KnowledgeGraph/knowledge_states.yaml
    - Characters/Garnette_Crew_Capabilities.yaml

  crew_roles:
    - KnowledgeGraph/campaign_state.yaml
    - Characters/Garnette_Crew_Capabilities.yaml
    - Ships/Garnette/Garnette_Capabilities.yaml

  garnette:
    - Ships/Garnette/Garnette_Ship_Brain.yaml
    - Ships/Garnette/Garnette_Spaces.yaml
    - Ships/Garnette/Garnette_Capabilities.yaml
    - Ships/Garnette/Garnette_Ownership.yaml
    - Ships/Garnette/Garnette_Unknowns_and_Decisions.md
    - Characters/Garnette_Crew_Capabilities.yaml

  ships:
    - Ships/Garnette/Garnette_Ship_Brain.yaml
    - Ships/Restless_Tentacle_Syndrome/RTS_Status.yaml
    - KnowledgeGraph/contradictions.yaml

  tapir:
    - Characters/Tapir/Tapir_Current_Status.yaml
    - Ships/Restless_Tentacle_Syndrome/RTS_Status.yaml
    - KnowledgeGraph/campaign_state.yaml
    - Chronology/Campaign_Chronology.yaml
    - Characters/Garnette_Crew_Capabilities.yaml

  chronology:
    - KnowledgeGraph/campaign_state.yaml
    - Chronology/Campaign_Chronology.yaml
    - Instructions/BRANCH_AND_DRAFT_POLICY.yaml
    - KnowledgeGraph/Future_Knowledge_Boundaries.yaml

  traveller_rules:
    - Reference/Source_Provenance_Schema.yaml
    - TravellerKnowledge/Indexes/Adventure_Index.yaml
    - KnowledgeGraph/Ancients_Kursae_Esseray_Backdrop.yaml

  ancient_history:
    - KnowledgeGraph/Ancients_Kursae_Esseray_Backdrop.yaml
    - KnowledgeGraph/canon_precedence.yaml
    - TravellerKnowledge/Indexes/Adventure_Index.yaml

  published_adventures:
    - TravellerKnowledge/Indexes/Adventure_Index.yaml
    - Instructions/BRANCH_AND_DRAFT_POLICY.yaml
    - KnowledgeGraph/Ancients_Kursae_Esseray_Backdrop.yaml

  isolated_branches:
    - Branches/isolated_mysteries_story.yaml
    - Instructions/BRANCH_AND_DRAFT_POLICY.yaml
    - KnowledgeGraph/campaign_state.yaml
    - KnowledgeGraph/Future_Knowledge_Boundaries.yaml

failure_rule: >
  If a required source cannot be accessed, identify the unavailable file.
  Do not invent canon-dependent facts or substitute remembered campaign state.

refresh_triggers:
  - referee_canon_correction
  - completed_scene
  - completed_session
  - branch_change
  - ownership_question
  - character_location_question
  - ship_capability_question
  - crew_role_or_skill_question
  - live_edge_question
  - explicit_verification_request
